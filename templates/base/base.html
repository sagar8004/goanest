{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>     
    <title>{% block title %}{% endblock %}</title>
    <meta name="description" content="Find your dream property in Goa. Verified listings, video call viewings, legal assistance. North Goa villas, South Goa retreats, Portuguese heritage homes."/>
    <meta property="og:title" content="GoaNest — Luxury Real Estate in Goa"/>
    <meta property="og:description" content="Find your dream property in Goa. Verified listings, video call viewings, legal assistance."/>
    <meta property="og:type" content="website"/>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

    <!-- AOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    {% block extra_css %}
    {% endblock %}

</head>

<body>

    {% block header %}
    {% endblock %}

    <main>

    <!-- Custom Cursor -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    {% block content %}
    {% endblock %}

    <!-- ── WHATSAPP FLOAT ── -->
    <a href="https://wa.me/919876543210?text=Hi! I found your listing on GoaNest and would like more information." class="whatsapp-float" target="_blank" aria-label="Chat on WhatsApp">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </a>

    </main>

    {% block footer %}
    {% endblock %}

    <script>
        
    /* ── INIT ── */
    AOS.init({ duration:700, once:true, offset:60, easing:'ease-out-cubic' });
    gsap.registerPlugin(ScrollTrigger);

    /* ── CUSTOM CURSOR ── */
    const cursor     = document.getElementById('cursor');
    const cursorRing = document.getElementById('cursorRing');
    let mouseX=0, mouseY=0, ringX=0, ringY=0;
    document.addEventListener('mousemove', e => {
    mouseX=e.clientX; mouseY=e.clientY;
    cursor.style.left=mouseX+'px';
    cursor.style.top =mouseY+'px';
    });
    (function animRing(){
    ringX += (mouseX - ringX) * 0.12;
    ringY += (mouseY - ringY) * 0.12;
    cursorRing.style.left=ringX+'px';
    cursorRing.style.top =ringY+'px';
    requestAnimationFrame(animRing);
    })();
    document.querySelectorAll('a,button,.property-card').forEach(el=>{
    el.addEventListener('mouseenter',()=>{
        cursor.style.width='16px'; cursor.style.height='16px';
        cursorRing.style.width='52px'; cursorRing.style.height='52px';
    });
    el.addEventListener('mouseleave',()=>{
        cursor.style.width='10px'; cursor.style.height='10px';
        cursorRing.style.width='36px'; cursorRing.style.height='36px';
    });
    });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
